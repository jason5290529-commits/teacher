<section class="hero">
    <h2>主要研究領域</h2>
    <p>
        根據淡江大學資工系教師資料，陳建彰教授的研究專長包含
        影像處理、浮水印、視覺密碼、演算式計算與多媒體系統。
    </p>
</section>

<section class="cards">

    <article class="card" onmouseover="cardOver(this)" onmouseout="cardOut(this)">
        <h3>影像處理</h3>
        <p>影像處理是利用電腦對圖片進行分析、改善或轉換的技術。</p>
    </article>

    <article class="card" onmouseover="cardOver(this)" onmouseout="cardOut(this)">
        <h3>浮水印</h3>
        <p>浮水印技術常用於保護數位圖片、影片或文件的版權。</p>
    </article>

    <article class="card" onmouseover="cardOver(this)" onmouseout="cardOut(this)">
        <h3>視覺密碼</h3>
        <p>視覺密碼是一種將資訊隱藏在影像中，並透過特定方式解讀的技術。</p>
    </article>

    <article class="card" onmouseover="cardOver(this)" onmouseout="cardOut(this)">
        <h3>多媒體系統</h3>
        <p>多媒體系統結合文字、圖片、音訊與影片，是資訊應用的重要領域。</p>
    </article>
